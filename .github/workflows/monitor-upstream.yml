name: Monitor Upstream for Lists Feature

on:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Monday 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check upstream for list router feature
        uses: actions/github-script@v7
        with:
          script: |
            const UPSTREAM_OWNER = 'jamcalli';
            const UPSTREAM_REPO = 'pulsarr';
            const KEYWORDS = [
              /plex\s+list/i,
              /custom\s+list/i,
              /router.*list/i,
              /list.*router/i,
              /list\s+rule/i,
              /router\s+rule.*list/i,
            ];
            const sevenDaysAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();

            const { data: prs } = await github.rest.pulls.list({
              owner: UPSTREAM_OWNER,
              repo: UPSTREAM_REPO,
              state: 'all',
              sort: 'updated',
              direction: 'desc',
              per_page: 30,
            });

            const relevantPRs = prs.filter(pr => {
              if (new Date(pr.updated_at) <= new Date(sevenDaysAgo)) return false;
              const text = `${pr.title} ${pr.body || ''}`;
              return KEYWORDS.some(kw => kw.test(text));
            });

            const { data: commits } = await github.rest.repos.listCommits({
              owner: UPSTREAM_OWNER,
              repo: UPSTREAM_REPO,
              since: sevenDaysAgo,
              per_page: 50,
            });

            const relevantCommits = commits.filter(c => {
              const msg = c.commit.message;
              return KEYWORDS.some(kw => kw.test(msg));
            });

            if (relevantPRs.length === 0 && relevantCommits.length === 0) {
              console.log('No relevant upstream activity this week.');
              return;
            }

            let body = '## Upstream list/router activity detected\n\n';
            body += '_Auto-generated by upstream monitor workflow._\n\n';

            if (relevantPRs.length > 0) {
              body += '### PRs\n\n';
              for (const pr of relevantPRs) {
                body += `- [#${pr.number} ${pr.title}](${pr.html_url}) — **${pr.state}**\n`;
              }
              body += '\n';
            }

            if (relevantCommits.length > 0) {
              body += '### Commits\n\n';
              for (const c of relevantCommits) {
                const msg = c.commit.message.split('\n')[0];
                body += `- [\`${c.sha.slice(0, 8)}\`](${c.html_url}) ${msg}\n`;
              }
              body += '\n';
            }

            body += '### Next step\n';
            body += 'If the upstream list router rule has landed, implement the piggyback:\n';
            body += '`feature/playlist-sunset-migration` — hook into the new list routing infrastructure for playlist protection migration.';

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '👀 Upstream list/router feature detected — review for piggyback',
              labels: ['upstream-monitor'],
              body,
            });

            console.log(`Created monitor issue #${issue.number}`);
